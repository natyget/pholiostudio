[build]
  # Build React SPA. nft bundles the Express function.
  command = "npm --prefix client install --legacy-peer-deps --include=dev && npm --prefix client run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

[functions]
  directory = "netlify/function"
  node_bundler = "nft"
  # Include EJS views, static assets, and DB migrations in the function zip.
  included_files = ["views/**", "public/**", "migrations/**"]

[functions."server"]
  timeout = 26
  memory = 3008
  # nft has a bug with directory requires (e.g. require('./something') without .js extension).
  # external_node_modules copies these packages wholesale so runtime resolution works correctly.
  # - express: require('./router') in application.js
  # - validator: require('./util/nullUndefinedCheck') in isFloat.js
  # - mime: ESM-only / directory require issues
  # - zod: v4 is ESM-only
  external_node_modules = ["express", "validator", "mime", "zod"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
