[build]
  # Install + build React SPA. Native Netlify functions bundled via nft.
  command = "npm --prefix client install --legacy-peer-deps --include=dev && npm --prefix client run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20.11.1"
  NPM_FLAGS = "--include=optional"

[functions]
  directory = "netlify/function"
  # nft correctly traces our NodeJS modules now that the postinstall script removed browser-isms	
  node_bundler = "nft"
  included_files = ["views/**", "public/**", "migrations/**"]

[functions."server"]
  timeout = 26
  memory = 3008

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
