[build]
  # Install client devDeps (vite, etc.) explicitly — NODE_ENV=production skips them otherwise
  command = "cd client && npm install --include=dev && npm run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  # Include optional deps (e.g. sqlite3 for local dev won't fail if missing)
  NPM_FLAGS = "--include=optional"

[functions]
  directory = "netlify/function"
  # nft (Node Function Tracing) handles native modules (sharp, bcrypt, etc.) correctly
  node_bundler = "nft"
  included_files = ["views/**", "public/**", "migrations/**"]

[functions."server"]
  timeout = 26
  memory = 3008

[[redirects]]
  # Static files in public/ are served directly by Netlify CDN.
  # All other requests (API, EJS pages, etc.) proxy to the serverless function.
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
