[build]
  command = "npm --prefix client install --legacy-peer-deps --include=dev && npm --prefix client run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

[functions]
  directory = "netlify/function"
  node_bundler = "nft"
  # nft cannot trace express's internal directory requires (./router, ./middleware/*).
  # Force-include the full express package so those files exist at runtime.
  included_files = [
    "views/**",
    "public/**",
    "migrations/**",
    "node_modules/express/**"
  ]

[functions."server"]
  timeout = 26
  memory = 3008

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
