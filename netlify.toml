[build]
  # Install + build React SPA only. Function bundling is handled by nft.
  command = "npm --prefix client install --legacy-peer-deps --include=dev && npm --prefix client run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20.11.1"
  NPM_FLAGS = "--include=optional"

[functions]
  directory = "netlify/function"
  # nft traces JS requires but has a bug with express's directory requires (e.g. require('./router')).
  # Fix: explicitly include express/lib/router and express/lib/middleware so nft doesn't need to trace them.
  # At runtime Node.js resolves directory requires fine — the issue is only at nft trace time.
  node_bundler = "nft"
  included_files = ["views/**", "public/**", "migrations/**", "node_modules/express/lib/router/**", "node_modules/express/lib/middleware/**"]

[functions."server"]
  timeout = 26
  memory = 3008

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
