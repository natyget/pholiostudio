[build]
  # Install client devDeps (vite, etc.) explicitly — NODE_ENV=production skips them otherwise
  command = "npm --prefix client install --legacy-peer-deps --include=dev && npm --prefix client run build"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"

[functions]
  directory = "netlify/function"
  # esbuild bundles everything into one file — no runtime module resolution issues.
  # nft was failing to trace Express's internal ./router directory.
  # Native .node binaries and large packages are kept external (copied from node_modules as-is).
  node_bundler = "esbuild"
  external_node_modules = [
    "bcrypt",
    "sharp",
    "@img",
    "@unrs",
    "sqlite3",
    "@sparticuz/chromium",
    "puppeteer",
    "fsevents"
  ]
  included_files = ["views/**", "public/**", "migrations/**"]

[functions."server"]
  timeout = 26
  memory = 3008

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
