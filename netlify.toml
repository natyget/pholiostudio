[build]
  # Install + build React SPA. Pre-bundle Netlify functions using esbuild.
  command = "npm --prefix client install --legacy-peer-deps --include=dev && npm --prefix client run build && npm run build:function"
  publish = "public"

[build.environment]
  NODE_VERSION = "20.11.1"
  NPM_FLAGS = "--include=optional"

[functions]
  directory = "netlify/function-built"
  # nft will now trace the esbuild output and correctly package the --external modules (like bcrypt, sqlite3) 
  node_bundler = "nft"
  included_files = ["views/**", "public/**", "migrations/**"]

[functions."server"]
  timeout = 26
  memory = 3008

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
