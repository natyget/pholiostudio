<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELARA KEATS | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
              serif: ['"Playfair Display"', 'serif'],
            },
            colors: {
              'pholio-backdrop': '#0a0a0a', /* Deep Black Backdrop */
              'pholio-card-bg': '#121212',  /* Dark Gray Cards */
              'pholio-accent': '#C9A55A',   /* Gold */
              'pholio-text-main': '#f8fafc',/* Off-white/Light Gray */
              'pholio-text-sub': '#94a3b8', /* Slate Gray */
              'pholio-border': 'rgba(255, 255, 255, 0.08)', /* Subtle Light Border */
            },
            borderRadius: {
              'card': '32px',
            },
            boxShadow: {
              'glass': '0 8px 32px rgba(0, 0, 0, 0.4)',
              'glow': '0 0 50px rgba(201, 165, 90, 0.1)',
              'card-depth': '0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2)',
            },
            transitionTimingFunction: {
              'premium': 'cubic-bezier(0.2, 0.8, 0.2, 1)',
            },
            animation: {
              'slow-zoom': 'slowZoom 20s ease-out forwards',
              'slide-up': 'slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'beam-spin': 'beamSpin 8s linear infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'planet-motion': 'rotatePlanet 20s linear infinite',
            },
            keyframes: {
              slowZoom: {
                '0%': { transform: 'scale(1.0)' },
                '100%': { transform: 'scale(1.1)' },
              },
              slideUpFade: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              beamSpin: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              },
              rotatePlanet: {
                'from': { transform: 'translate(-50%, -50%) rotate(0deg)' },
                'to': { transform: 'translate(-50%, -50%) rotate(360deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0a0a0a;
        color: #f8fafc;
        margin: 0;
        overflow-x: hidden;
      }
      html { scroll-behavior: smooth; }
      
      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0a0a0a; }
      ::-webkit-scrollbar-thumb { background: #C9A55A; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #b08d45; }
      
      /* Planet Sphere for Dark Mode */
      .planet-sphere {
        background: radial-gradient(circle at 30% 30%, rgba(201, 165, 90, 0.1), transparent 60%),
                    radial-gradient(circle at 70% 70%, rgba(201, 165, 90, 0.3), transparent 30%);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
